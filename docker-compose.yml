services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: abd
      POSTGRES_PASSWORD: abd
      POSTGRES_DB: abd_oms
    ports: ["5432:5432"]
    volumes: ["abd_pgdata:/var/lib/postgresql/data"]
  db_test:
    image: postgres:16
    environment:
      POSTGRES_USER: abd
      POSTGRES_PASSWORD: abd
      POSTGRES_DB: abd_oms_test
    ports: ["5433:5432"]
volumes:
  abd_pgdata:
